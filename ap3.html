<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerenciador N2 - Stor Sistemas (Firebase)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tab-button.active { background-color: #1e40af; border-bottom: 4px solid #facc15; }
        .situacao-fechada { background-color: #dcfce7; color: #166534; }
        .situacao-aberta { background-color: #fee2e2; color: #991b1b; }
        
        /* Estilos Thomas - Contraste Elevado */
        .badge-data { background-color: #e5e7eb; border: 1.5px solid #000000; color: #000000; font-weight: 900; padding: 2px 6px; border-radius: 4px; display: inline-block; }
        .badge-sistema { background-color: #000000; color: #ffffff; font-weight: 900; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; border: 1px solid #ffffff; }
        .input-filtro { border: 2px solid #000000; padding: 8px; border-radius: 6px; width: 100%; font-size: 14px; font-weight: 800; color: #000000; }
        .btn-portabilidade { font-size: 10px; font-weight: 900; padding: 4px 8px; border-radius: 4px; border: 1px solid #ffffff; transition: all 0.2s; cursor: pointer; }
        .btn-portabilidade:hover { background-color: #ffffff; color: #1e3a8a; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 relative">

    <!-- Notificações Customizadas (Substitui o alert nativo) -->
    <div id="notificacao" class="fixed top-4 right-4 p-4 rounded shadow-xl font-bold z-50 text-white transition-opacity" style="display: none;"></div>

    <!-- Modal de Confirmação Customizado (Substitui o confirm nativo) -->
    <div id="modal-confirm" class="fixed inset-0 bg-black bg-opacity-50 items-center justify-center z-50" style="display: none;">
        <div class="bg-white p-6 rounded-lg shadow-2xl max-w-sm w-full text-center border-4 border-blue-900">
            <h3 class="font-black text-lg mb-4 text-black" id="modal-confirm-msg">Tem certeza?</h3>
            <div class="flex justify-center gap-4">
                <button id="btn-confirm-yes" class="bg-blue-700 hover:bg-blue-800 text-white px-4 py-2 rounded font-black cursor-pointer uppercase text-sm">Sim, continuar</button>
                <button id="btn-confirm-no" class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded font-black cursor-pointer uppercase text-sm">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Header -->
    <nav class="bg-blue-900 text-white p-4 shadow-xl">
        <div class="container mx-auto flex flex-wrap justify-between items-center">
            <div class="flex items-center gap-4">
                <h1 class="text-xl font-bold border-l-4 border-yellow-500 pl-3 uppercase tracking-tighter">Thomas | Especialista N2 <span class="text-[10px] bg-green-500 text-white px-2 py-1 rounded ml-2 shadow font-bold">ONLINE (FIREBASE)</span></h1>
                <div class="flex gap-2 border-l border-blue-400 pl-4">
                    <button onclick="window.exportarJSON()" class="btn-portabilidade bg-blue-800">💾 GERAR BACKUP</button>
                    <label class="btn-portabilidade bg-green-700 cursor-pointer">
                        📂 MIGRAR JSON P/ NUVEM
                        <input type="file" id="inputJson" accept=".json" class="hidden" onchange="window.importarJSON(event)">
                    </label>
                </div>
            </div>
            <div id="nav-buttons" class="space-x-2 mt-2 md:mt-0">
                <button onclick="window.showTab(event, 'duvidas')" class="tab-button active px-3 py-1 hover:bg-blue-700 rounded transition text-sm font-bold">Dúvidas N1</button>
                <button onclick="window.showTab(event, 'ordens')" class="tab-button px-3 py-1 hover:bg-blue-700 rounded transition text-sm font-bold">N3 & Versões</button>
                <button onclick="window.showTab(event, 'outras')" class="tab-button px-3 py-1 hover:bg-blue-700 rounded transition text-sm font-bold">Outras O.S.</button>
                <button onclick="window.showTab(event, 'dash')" class="tab-button px-3 py-1 bg-yellow-600 hover:bg-yellow-500 rounded font-bold transition text-sm">Dashboard</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 md:p-6">
        
        <!-- ABA: DÚVIDAS -->
        <div id="duvidas" class="tab-content active">
            <div class="bg-white p-6 rounded-lg shadow-md mb-6 border-t-4 border-blue-500">
                <h2 class="text-lg font-bold mb-4 text-blue-800 underline italic">Dúvidas do Suporte</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input type="hidden" id="d-id">
                    <input type="date" id="d-data" class="border p-2 rounded font-bold text-black border-black">
                    <input type="text" id="d-suporte" placeholder="Nome do Suporte" class="border p-2 rounded font-bold text-black border-black">
                    <input type="text" id="d-duvida" placeholder="Dúvida/Solução" class="border p-2 rounded font-bold text-black border-black">
                    <button id="btn-d-save" onclick="window.addDuvida()" class="bg-blue-700 text-white p-2 rounded hover:bg-blue-800 font-bold uppercase cursor-pointer">Salvar</button>
                </div>
            </div>

            <div class="mb-4">
                <input type="text" id="f-duvidas" onkeyup="window.renderAll()" placeholder="🔍 Filtrar dúvidas (Suporte ou Texto)..." class="input-filtro bg-white">
            </div>

            <div class="bg-white rounded-lg shadow-md overflow-x-auto border border-gray-300">
                <table class="w-full text-left" id="tabela-duvidas">
                    <thead class="bg-gray-200 text-xs uppercase font-black text-black">
                        <tr>
                            <th class="p-3">Data</th>
                            <th class="p-3">Suporte</th>
                            <th class="p-3">Descrição</th>
                            <th class="p-3 text-right">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="lista-duvidas"></tbody>
                </table>
            </div>
        </div>

        <!-- ABA: N3 / VERSÕES -->
        <div id="ordens" class="tab-content">
            <div class="bg-white p-6 rounded-lg shadow-md mb-6 border-t-4 border-red-600">
                <h2 class="text-lg font-bold mb-4 text-red-700 underline italic">N3 / QA / Desenvolvimento</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                    <input type="hidden" id="o-id">
                    <input type="date" id="o-data" class="border p-2 rounded font-bold text-black border-black">
                    <input type="text" id="o-os" placeholder="Nº O.S" class="border p-2 rounded font-bold text-black border-black">
                    <input type="text" id="o-desk" placeholder="Nº DESK" class="border p-2 rounded bg-yellow-50 font-bold text-black border-black">
                    <select id="o-situacao" class="border p-2 rounded font-black text-black border-black">
                        <option value="ABERTA">ABERTA</option>
                        <option value="FECHADA">FECHADA</option>
                    </select>
                    <select id="o-sistema" class="border p-2 rounded font-black text-black border-black">
                        <option value="STOR">STOR</option>
                        <option value="AGRO">AGRO</option>
                    </select>
                    <input type="text" id="o-cliente" placeholder="Licença/Empresa" class="border p-2 rounded font-bold text-black border-black">
                    <input type="text" id="o-solicitante" placeholder="Solicitante (Suporte)" class="border p-2 rounded font-bold text-black border-black">
                    <input type="text" id="o-versao" placeholder="Versão Correção" class="border p-2 rounded text-red-700 font-black border-red-600">
                    <textarea id="o-log" placeholder="Change Log / Detalhes" class="border p-2 rounded col-span-full h-20 font-medium text-black border-black"></textarea>
                    <button id="btn-o-save" onclick="window.addOrdem()" class="bg-red-600 text-white p-2 rounded hover:bg-red-700 col-span-full font-bold uppercase cursor-pointer">Registrar em Versão</button>
                </div>

                <div class="bg-gray-50 p-4 rounded border-2 border-red-200">
                    <input type="text" id="filtro-versao" onkeyup="window.renderAll()" placeholder="🔍 Filtrar N3 por O.S., Versão ou Empresa..." class="input-filtro mb-2">
                    <button onclick="window.exportarN3Filtrado()" class="bg-green-700 text-white px-4 py-2 rounded text-xs font-bold uppercase hover:bg-green-800 cursor-pointer">Exportar Filtro Atual (Excel)</button>
                </div>
            </div>
            <div id="lista-ordens" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <!-- ABA: OUTRAS O.S. -->
        <div id="outras" class="tab-content">
            <div class="bg-white p-6 rounded-lg shadow-md mb-6 border-t-4 border-green-600">
                <h2 class="text-lg font-bold mb-4 text-green-800 underline italic">Outras O.S.</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                    <input type="hidden" id="out-id">
                    <input type="date" id="out-data" class="border p-2 rounded font-bold text-black border-black">
                    <input type="text" id="out-os" placeholder="Nº O.S" class="border p-2 rounded font-bold text-black border-black">
                    <select id="out-situacao" class="border p-2 rounded font-black text-black border-black">
                        <option value="ABERTA">ABERTA</option>
                        <option value="FECHADA">FECHADA</option>
                    </select>
                    <select id="out-sistema" class="border p-2 rounded font-black text-black border-black">
                        <option value="STOR">STOR</option>
                        <option value="AGRO">AGRO</option>
                    </select>
                    <input type="text" id="out-cliente" placeholder="Licença" class="border p-2 rounded font-bold text-black border-black">
                    <input type="text" id="out-solicitante" placeholder="Suporte N1" class="border p-2 rounded font-bold text-black border-black">
                    <input type="text" id="out-etapa" placeholder="Etapa" class="border p-2 rounded font-bold text-black border-black">
                    <input type="text" id="out-tipo" placeholder="Tipo" class="border p-2 rounded col-span-1 md:col-span-2 font-bold text-black border-black">
                    <textarea id="out-obs" placeholder="Observação" class="border p-2 rounded col-span-full h-16 font-medium text-black border-black"></textarea>
                    <button id="btn-out-save" onclick="window.addOutra()" class="bg-green-700 text-white p-2 rounded hover:bg-green-800 col-span-full font-bold uppercase cursor-pointer">Salvar</button>
                </div>
            </div>

            <div class="mb-4">
                <input type="text" id="f-outras" onkeyup="window.renderAll()" placeholder="🔍 Filtrar O.S. de acompanhamento..." class="input-filtro bg-white">
            </div>

            <div id="lista-outras" class="grid grid-cols-1 gap-3 text-sm"></div>
        </div>

        <!-- ABA: DASHBOARD -->
        <div id="dash" class="tab-content">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 text-center font-bold">
                <div class="bg-white p-6 rounded-lg shadow-xl border-b-8 border-blue-800">
                    <p class="text-gray-500 uppercase text-xs">Total Dúvidas</p>
                    <h3 id="stat-duvidas" class="text-4xl text-blue-800 font-black">0</h3>
                </div>
                <div class="bg-white p-6 rounded-lg shadow-xl border-b-8 border-red-600">
                    <p class="text-gray-500 uppercase text-xs text-red-600">Correções N3</p>
                    <h3 id="stat-ordens" class="text-4xl text-red-600 font-black">0</h3>
                </div>
                <div class="bg-white p-6 rounded-lg shadow-xl border-b-8 border-green-600">
                    <p class="text-gray-500 uppercase text-xs text-green-700">Outras O.S.</p>
                    <h3 id="stat-outras" class="text-4xl text-green-700 font-black">0</h3>
                </div>
            </div>
            <div class="bg-white p-6 rounded-lg shadow text-center">
                <h3 class="font-black text-gray-900 mb-4 uppercase">Opções de Exportação</h3>
                <button onclick="window.exportarCSVCompleto()" class="bg-black text-white px-8 py-3 rounded hover:bg-gray-800 transition font-black uppercase shadow-lg cursor-pointer">Exportar Tudo para Excel (.CSV)</button>
            </div>
        </div>
    </div>

    <!-- SCRIPT TIPO MODULE: Importante para ler as bibliotecas do Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA_po9hvJqFPri_AI4uw73AiYb5BbspNjs",
            authDomain: "thomas-teste-d7a3d.firebaseapp.com",
            projectId: "thomas-teste-d7a3d",
            storageBucket: "thomas-teste-d7a3d.firebasestorage.app",
            messagingSenderId: "280109049625",
            appId: "1:280109049625:web:487874357d0173797d0788"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Arrays globais
        window.duvidas = [];
        window.ordens = [];
        window.outras = [];

        // --- SISTEMA DE UI (MODALS & NOTIFICAÇÕES) ---
        window.showNotificacao = function(msg, isError = false) {
            const div = document.getElementById('notificacao');
            div.innerText = msg;
            div.className = `fixed top-4 right-4 p-4 rounded shadow-xl font-bold z-50 text-white transition-opacity ${isError ? 'bg-red-600' : 'bg-green-600'}`;
            div.style.display = 'block';
            setTimeout(() => { div.style.display = 'none'; }, 4000);
        };

        window.customConfirm = function(msg, callbackYes) {
            document.getElementById('modal-confirm-msg').innerText = msg;
            const modal = document.getElementById('modal-confirm');
            modal.style.display = 'flex';
            
            document.getElementById('btn-confirm-yes').onclick = function() {
                modal.style.display = 'none';
                callbackYes();
            };
            
            document.getElementById('btn-confirm-no').onclick = function() {
                modal.style.display = 'none';
                document.getElementById('inputJson').value = ''; // Limpa input se cancelar a importação
            };
        };


        // --- SISTEMA DE ESCUTA EM TEMPO REAL ---
        onSnapshot(collection(db, "duvidas"), (snapshot) => {
            window.duvidas = [];
            snapshot.forEach(doc => {
                let item = doc.data();
                item.id = doc.id;
                window.duvidas.push(item);
            });
            window.renderAll();
        });

        onSnapshot(collection(db, "ordens"), (snapshot) => {
            window.ordens = [];
            snapshot.forEach(doc => {
                let item = doc.data();
                item.id = doc.id;
                window.ordens.push(item);
            });
            window.renderAll();
        });

        onSnapshot(collection(db, "outras"), (snapshot) => {
            window.outras = [];
            snapshot.forEach(doc => {
                let item = doc.data();
                item.id = doc.id;
                window.outras.push(item);
            });
            window.renderAll();
        });

        // --- FUNÇÕES DE NAVEGAÇÃO E DATAS ---
        window.formatData = function(dataISO) {
            if(!dataISO || dataISO.includes('/')) return dataISO;
            const p = dataISO.split('-');
            return p[2] + '/' + p[1] + '/' + p[0];
        }

        window.converterParaISO = function(dataBR) {
            if(!dataBR || dataBR.includes('-')) return dataBR;
            const p = dataBR.split('/');
            return p[2] + '-' + p[1] + '-' + p[0];
        }

        window.compararDatas = function(a, b) {
            const dateA = new Date(window.converterParaISO(a.data));
            const dateB = new Date(window.converterParaISO(b.data));
            return dateB - dateA; 
        }

        window.onload = () => {
            const hoje = new Date().toISOString().split('T')[0];
            document.getElementById('d-data').value = hoje;
            document.getElementById('o-data').value = hoje;
            document.getElementById('out-data').value = hoje;
        };

        window.showTab = function(event, tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
            window.renderAll();
        }

        // --- MODO CRUD: DÚVIDAS ---
        window.addDuvida = async function() {
            const id = document.getElementById('d-id').value;
            const obj = { 
                data: window.formatData(document.getElementById('d-data').value), 
                suporte: document.getElementById('d-suporte').value, 
                texto: document.getElementById('d-duvida').value 
            };
            if(!obj.suporte || !obj.texto) return window.showNotificacao("Preencha todos os campos obrigatórios!", true);
            
            try {
                if(id !== "") { 
                    await updateDoc(doc(db, "duvidas", id), obj);
                    document.getElementById('d-id').value = ""; 
                } else { 
                    await addDoc(collection(db, "duvidas"), obj);
                }
                document.getElementById('d-duvida').value = "";
                document.getElementById('btn-d-save').innerText = "Salvar";
                window.showNotificacao("Dúvida salva com sucesso!");
            } catch(e) { window.showNotificacao("Erro ao salvar: " + e, true); }
        }

        window.editarDuvida = function(id) { 
            let d = null;
            for(let i=0; i<window.duvidas.length; i++) { if(window.duvidas[i].id === id) d = window.duvidas[i]; }
            if(!d) return;
            document.getElementById('d-id').value = id; 
            document.getElementById('d-data').value = window.converterParaISO(d.data);
            document.getElementById('d-suporte').value = d.suporte || ""; 
            document.getElementById('d-duvida').value = d.texto || "";
            window.scrollTo(0,0);
        }

        // --- MODO CRUD: ORDENS ---
        window.addOrdem = async function() {
            const id = document.getElementById('o-id').value;
            const obj = {
                data: window.formatData(document.getElementById('o-data').value), 
                os: document.getElementById('o-os').value,
                desk: document.getElementById('o-desk').value, 
                situacao: document.getElementById('o-situacao').value,
                sistema: document.getElementById('o-sistema').value, 
                cliente: document.getElementById('o-cliente').value,
                solicitante: document.getElementById('o-solicitante').value, 
                versao: document.getElementById('o-versao').value,
                log: document.getElementById('o-log').value
            };
            if(!obj.os) return window.showNotificacao("Nº da O.S. é obrigatório!", true);

            try {
                if(id !== "") { 
                    await updateDoc(doc(db, "ordens", id), obj);
                    document.getElementById('o-id').value = ""; 
                } else { 
                    await addDoc(collection(db, "ordens"), obj);
                }
                document.getElementById('o-os').value = "";
                document.getElementById('o-desk').value = "";
                document.getElementById('o-cliente').value = "";
                document.getElementById('o-solicitante').value = "";
                document.getElementById('o-versao').value = "";
                document.getElementById('o-log').value = "";
                window.showNotificacao("Ordem salva com sucesso!");
            } catch(e) { window.showNotificacao("Erro ao salvar: " + e, true); }
        }

        window.editarOrdem = function(id) {
            let o = null;
            for(let i=0; i<window.ordens.length; i++) { if(window.ordens[i].id === id) o = window.ordens[i]; }
            if(!o) return;
            document.getElementById('o-id').value = id;
            document.getElementById('o-data').value = window.converterParaISO(o.data);
            document.getElementById('o-os').value = o.os || "";
            document.getElementById('o-desk').value = o.desk || "";
            document.getElementById('o-situacao').value = o.situacao || "ABERTA";
            document.getElementById('o-sistema').value = o.sistema || "STOR";
            document.getElementById('o-cliente').value = o.cliente || "";
            document.getElementById('o-solicitante').value = o.solicitante || "";
            document.getElementById('o-versao').value = o.versao || "";
            document.getElementById('o-log').value = o.log || "";
            window.scrollTo(0,0);
        }

        // --- MODO CRUD: OUTRAS ---
        window.addOutra = async function() {
            const id = document.getElementById('out-id').value;
            const obj = {
                data: window.formatData(document.getElementById('out-data').value), 
                os: document.getElementById('out-os').value,
                situacao: document.getElementById('out-situacao').value, 
                sistema: document.getElementById('out-sistema').value,
                cliente: document.getElementById('out-cliente').value, 
                solicitante: document.getElementById('out-solicitante').value,
                etapa: document.getElementById('out-etapa').value, 
                tipo: document.getElementById('out-tipo').value, 
                obs: document.getElementById('out-obs').value
            };
            if(!obj.os) return window.showNotificacao("Nº da O.S. é obrigatório!", true);

            try {
                if(id !== "") { 
                    await updateDoc(doc(db, "outras", id), obj);
                    document.getElementById('out-id').value = ""; 
                } else { 
                    await addDoc(collection(db, "outras"), obj);
                }
                document.getElementById('out-os').value = "";
                document.getElementById('out-cliente').value = "";
                document.getElementById('out-solicitante').value = "";
                document.getElementById('out-etapa').value = "";
                document.getElementById('out-tipo').value = "";
                document.getElementById('out-obs').value = "";
                window.showNotificacao("O.S salva com sucesso!");
            } catch(e) { window.showNotificacao("Erro ao salvar: " + e, true); }
        }

        window.editarOutra = function(id) {
            let out = null;
            for(let i=0; i<window.outras.length; i++) { if(window.outras[i].id === id) out = window.outras[i]; }
            if(!out) return;
            document.getElementById('out-id').value = id;
            document.getElementById('out-data').value = window.converterParaISO(out.data);
            document.getElementById('out-os').value = out.os || "";
            document.getElementById('out-situacao').value = out.situacao || "ABERTA";
            document.getElementById('out-sistema').value = out.sistema || "STOR";
            document.getElementById('out-cliente').value = out.cliente || "";
            document.getElementById('out-solicitante').value = out.solicitante || "";
            document.getElementById('out-etapa').value = out.etapa || "";
            document.getElementById('out-tipo').value = out.tipo || "";
            document.getElementById('out-obs').value = out.obs || "";
            window.scrollTo(0,0);
        }

        // --- GLOBAL: DELETAR ---
        window.deleteItem = function(id, tipo) {
            window.customConfirm("Você tem certeza? Isso apagará o item permanentemente da nuvem.", async () => {
                try {
                    let colecao = (tipo === 'd') ? 'duvidas' : ((tipo === 'o') ? 'ordens' : 'outras');
                    await deleteDoc(doc(db, colecao, id));
                    window.showNotificacao("Item excluído com sucesso!");
                } catch(e) { window.showNotificacao("Erro ao excluir: " + e, true); }
            });
        }

        // --- RENDERIZAÇÃO BLINDADA ---
        window.renderAll = function() {
            // 1. Dúvidas
            const fDuv = document.getElementById('f-duvidas').value.toLowerCase();
            let htmlDuvidas = "";
            let duvOrdenadas = Array.from(window.duvidas).sort(window.compararDatas);
            
            duvOrdenadas.forEach(d => {
                let suporteText = d.suporte ? d.suporte.toLowerCase() : "";
                let duvidaText = d.texto ? d.texto.toLowerCase() : "";
                if (suporteText.includes(fDuv) || duvidaText.includes(fDuv)) {
                    htmlDuvidas += `<tr class="border-b text-sm">
                        <td class="p-3"><span class="badge-data">${d.data || ''}</span></td>
                        <td class="p-3 font-black text-blue-900 uppercase">${d.suporte || ''}</td>
                        <td class="p-3 text-xs font-bold text-gray-900">${d.texto || ''}</td>
                        <td class="p-3 text-right space-x-2 font-black uppercase text-[10px]">
                            <button onclick="window.editarDuvida('${d.id}')" class="text-orange-600 hover:underline cursor-pointer">Editar</button>
                            <button onclick="window.deleteItem('${d.id}','d')" class="text-red-600 cursor-pointer hover:underline">Excluir</button>
                        </td>
                    </tr>`;
                }
            });
            document.getElementById('lista-duvidas').innerHTML = htmlDuvidas;

            // 2. Ordens
            const fN3 = document.getElementById('filtro-versao').value.toLowerCase();
            let htmlOrdens = "";
            let ordOrdenadas = Array.from(window.ordens).sort(window.compararDatas);

            ordOrdenadas.forEach(o => {
                let versaoText = o.versao ? o.versao.toLowerCase() : "";
                let osText = o.os ? o.os.toLowerCase() : "";
                let cliText = o.cliente ? o.cliente.toLowerCase() : "";
                
                if (versaoText.includes(fN3) || osText.includes(fN3) || cliText.includes(fN3)) {
                    let stClass = (o.situacao === 'FECHADA') ? 'situacao-fechada' : 'situacao-aberta';
                    htmlOrdens += `<div class="bg-white p-4 rounded shadow-md border-l-8 border-red-600">
                        <div class="flex justify-between font-black text-black">
                            <span>O.S ${o.os || ''} | <span class="text-blue-700">DESK: ${o.desk || '-'}</span></span>
                            <span class="text-[10px] px-2 py-1 rounded border border-black ${stClass}">${o.situacao || ''}</span>
                        </div>
                        <p class="mt-1"><span class="badge-sistema">${o.sistema || ''}</span> <span class="text-[10px] font-black text-black ml-2 uppercase">SUPORTE: ${o.solicitante || '?'}</span></p>
                        <p class="text-[11px] font-black text-black mt-2"><span class="badge-data">${o.data || ''}</span> | ${o.cliente || ''}</p>
                        <p class="mt-2 text-xs italic bg-gray-100 p-2 border border-gray-400 rounded text-black font-bold">"${o.log || ''}"</p>
                        <div class="flex justify-between mt-3 items-center">
                            <span class="font-black text-red-700 text-sm bg-red-50 px-2 rounded border-2 border-red-200">${o.versao || ''}</span>
                            <div class="space-x-3 text-[10px] font-black uppercase">
                                <button onclick="window.editarOrdem('${o.id}')" class="text-orange-600 cursor-pointer hover:underline">Editar</button>
                                <button onclick="window.deleteItem('${o.id}','o')" class="text-red-500 cursor-pointer hover:underline">Excluir</button>
                            </div>
                        </div>
                    </div>`;
                }
            });
            document.getElementById('lista-ordens').innerHTML = htmlOrdens;

            // 3. Outras
            const fOut = document.getElementById('f-outras').value.toLowerCase();
            let htmlOutras = "";
            let outOrdenadas = Array.from(window.outras).sort(window.compararDatas);

            outOrdenadas.forEach(out => {
                let outOsText = out.os ? out.os.toLowerCase() : "";
                let outCliText = out.cliente ? out.cliente.toLowerCase() : "";
                let outObsText = out.obs ? out.obs.toLowerCase() : "";

                if (outOsText.includes(fOut) || outCliText.includes(fOut) || outObsText.includes(fOut)) {
                    let stClassOut = (out.situacao === 'FECHADA') ? 'situacao-fechada' : 'situacao-aberta';
                    htmlOutras += `<div class="bg-white p-3 rounded shadow border-l-4 border-green-600 flex justify-between items-center border border-gray-200">
                        <div>
                            <div class="flex gap-2 items-center">
                                <span class="font-black text-black text-xs">O.S ${out.os || ''}</span>
                                <span class="text-[9px] font-black px-1 rounded border border-black ${stClassOut}">${out.situacao || ''}</span>
                            </div>
                            <p class="text-[10px] font-black text-black mt-1"><span class="badge-data">${out.data || ''}</span> | <span class="badge-sistema text-[8px]">${out.sistema || ''}</span> | ${out.cliente || ''}</p>
                            <p class="text-[10px] font-black text-red-700 italic uppercase mt-1">ETAPA: ${out.etapa || ''}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] text-black font-bold">${out.obs || ''}</p>
                            <div class="space-x-2 text-[10px] font-black uppercase mt-1">
                                <button onclick="window.editarOutra('${out.id}')" class="text-orange-600 cursor-pointer hover:underline">Editar</button>
                                <button onclick="window.deleteItem('${out.id}','out')" class="text-red-500 cursor-pointer hover:underline">Excluir</button>
                            </div>
                        </div>
                    </div>`;
                }
            });
            document.getElementById('lista-outras').innerHTML = htmlOutras;

            document.getElementById('stat-duvidas').innerText = window.duvidas.length;
            document.getElementById('stat-ordens').innerText = window.ordens.length;
            document.getElementById('stat-outras').innerText = window.outras.length;
        }

        // --- SISTEMA DE IMPORTAÇÃO PARA O FIREBASE (MÁGICO) ---
        window.importarJSON = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    window.customConfirm("Isto vai pegar os dados do seu arquivo JSON antigo e GRAVAR no Firebase. Deseja continuar?", async () => {
                        window.showNotificacao("Iniciando migração... Por favor, não feche a janela.");
                        
                        // Envia as Dúvidas
                        if(imported.duvidas) {
                            for(let i=0; i<imported.duvidas.length; i++) { 
                                await addDoc(collection(db, "duvidas"), imported.duvidas[i]); 
                            }
                        }
                        // Envia as Ordens
                        if(imported.ordens) {
                            for(let i=0; i<imported.ordens.length; i++) { 
                                await addDoc(collection(db, "ordens"), imported.ordens[i]); 
                            }
                        }
                        // Envia as Outras O.S
                        if(imported.outras) {
                            for(let i=0; i<imported.outras.length; i++) { 
                                await addDoc(collection(db, "outras"), imported.outras[i]); 
                            }
                        }
                        
                        window.showNotificacao("Migração concluída com SUCESSO! Todos os seus dados já estão na nuvem.");
                        document.getElementById('inputJson').value = ''; // Limpa o input
                    });
                } catch (err) { 
                    window.showNotificacao("Erro ao ler o arquivo JSON: " + err, true); 
                    document.getElementById('inputJson').value = '';
                }
            };
            reader.readAsText(file);
        }

        window.exportarJSON = function() {
            const dataFull = { duvidas: window.duvidas, ordens: window.ordens, outras: window.outras, versao: "14.0 Firebase", backup_data: new Date().toLocaleDateString() };
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(dataFull));
            const dlAnchor = document.createElement('a');
            dlAnchor.setAttribute("href", dataStr);
            dlAnchor.setAttribute("download", "backup_nuvem_thomas_" + new Date().toISOString().split('T')[0] + ".json");
            dlAnchor.click();
        }

        // --- EXPORTAÇÕES EXCEL ---
        window.exportarCSVCompleto = function() {
            let csv = "Tipo;Data;OS;DESK;Situacao;Sistema;Cli_Sup;Versao_Etapa_Obs\n";
            
            let cDuv = Array.from(window.duvidas).sort(window.compararDatas);
            cDuv.forEach(d => { csv += "DUVIDA;" + (d.data||"") + ";-;-;-;-;" + (d.suporte||"") + ";" + (d.texto?d.texto.replace(/;/g, ','):"") + "\n"; });
            
            let cOrd = Array.from(window.ordens).sort(window.compararDatas);
            cOrd.forEach(o => { csv += "N3;" + (o.data||"") + ";" + (o.os||"") + ";" + (o.desk||"") + ";" + (o.situacao||"") + ";" + (o.sistema||"") + ";" + (o.cliente||"") + " | " + (o.solicitante||"") + ";" + (o.versao||"") + " - " + (o.log?o.log.replace(/;/g, ','):"") + "\n"; });
            
            let cOut = Array.from(window.outras).sort(window.compararDatas);
            cOut.forEach(out => { csv += "OUTRAS;" + (out.data||"") + ";" + (out.os||"") + ";-;" + (out.situacao||"") + ";" + (out.sistema||"") + ";" + (out.cliente||"") + " | " + (out.solicitante||"") + ";" + (out.etapa||"") + " - " + (out.obs?out.obs.replace(/;/g, ','):"") + "\n"; });
            
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement('a');
            a.href = window.URL.createObjectURL(blob);
            a.download = "gerenciador_n2_completo_firebase.csv";
            a.click();
        }

        window.exportarN3Filtrado = function() {
            const termo = document.getElementById('filtro-versao').value.toLowerCase();
            let filtradas = [];
            Array.from(window.ordens).forEach(o => {
                if(o.versao && o.versao.toLowerCase().includes(termo)) filtradas.push(o);
            });
            filtradas.sort(window.compararDatas);

            if(filtradas.length === 0) return window.showNotificacao("Nada encontrado no filtro!", true);
            
            let csv = "Data;OS;DESK;Situacao;Sistema;Cliente;Solicitante;Versao;Log\n";
            filtradas.forEach(o => {
                csv += (o.data||"") + ";" + (o.os||"") + ";" + (o.desk||"") + ";" + (o.situacao||"") + ";" + (o.sistema||"") + ";" + (o.cliente||"") + ";" + (o.solicitante||"") + ";" + (o.versao||"") + ";" + (o.log?o.log.replace(/;/g, ','):"") + "\n";
            });
            
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement('a');
            a.href = window.URL.createObjectURL(blob);
            a.download = `filtro_n3_firebase.csv`;
            a.click();
        }
    </script>
</body>

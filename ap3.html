<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerenciador N2 - Stor Sistemas (V13)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tab-button.active { background-color: #1e40af; border-bottom: 4px solid #facc15; }
        .situacao-fechada { background-color: #dcfce7; color: #166534; }
        .situacao-aberta { background-color: #fee2e2; color: #991b1b; }
        
        /* Estilos Thomas - Contraste Elevado */
        .badge-data { background-color: #e5e7eb; border: 1.5px solid #000000; color: #000000; font-weight: 900; padding: 2px 6px; border-radius: 4px; display: inline-block; }
        .badge-sistema { background-color: #000000; color: #ffffff; font-weight: 900; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; border: 1px solid #ffffff; }
        .input-filtro { border: 2px solid #000000; padding: 8px; border-radius: 6px; width: 100%; font-size: 14px; font-weight: 800; color: #000000; }
        .btn-portabilidade { font-size: 10px; font-weight: 900; padding: 4px 8px; border-radius: 4px; border: 1px solid #ffffff; transition: all 0.2s; }
        .btn-portabilidade:hover { background-color: #ffffff; color: #1e3a8a; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <!-- Header -->
    <nav class="bg-blue-900 text-white p-4 shadow-xl">
        <div class="container mx-auto flex flex-wrap justify-between items-center">
            <div class="flex items-center gap-4">
                <h1 class="text-xl font-bold border-l-4 border-yellow-500 pl-3 uppercase tracking-tighter">Thomas | Especialista N2 <span class="text-[10px] bg-yellow-500 text-blue-900 px-1 rounded ml-2">V13</span></h1>
                <div class="flex gap-2 border-l border-blue-400 pl-4">
                    <button onclick="exportarJSON()" class="btn-portabilidade bg-blue-800">💾 GERAR BACKUP (.JSON)</button>
                    <label class="btn-portabilidade bg-green-700 cursor-pointer">
                        📂 IMPORTAR BACKUP
                        <input type="file" id="inputJson" accept=".json" class="hidden" onchange="importarJSON(event)">
                    </label>
                </div>
            </div>
            <div id="nav-buttons" class="space-x-2 mt-2 md:mt-0">
                <button onclick="showTab(event, 'duvidas')" class="tab-button active px-3 py-1 hover:bg-blue-700 rounded transition text-sm font-bold">Dúvidas N1</button>
                <button onclick="showTab(event, 'ordens')" class="tab-button px-3 py-1 hover:bg-blue-700 rounded transition text-sm font-bold">N3 & Versões</button>
                <button onclick="showTab(event, 'outras')" class="tab-button px-3 py-1 hover:bg-blue-700 rounded transition text-sm font-bold">Outras O.S.</button>
                <button onclick="showTab(event, 'dash')" class="tab-button px-3 py-1 bg-yellow-600 hover:bg-yellow-500 rounded font-bold transition text-sm">Dashboard</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 md:p-6">
        
        <!-- ABA: DÚVIDAS -->
        <div id="duvidas" class="tab-content active">
            <div class="bg-white p-6 rounded-lg shadow-md mb-6 border-t-4 border-blue-500">
                <h2 class="text-lg font-bold mb-4 text-blue-800 underline italic">Dúvidas do Suporte</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input type="hidden" id="d-id">
                    <input type="date" id="d-data" class="border p-2 rounded font-bold text-black border-black">
                    <input type="text" id="d-suporte" placeholder="Nome do Suporte" class="border p-2 rounded font-bold text-black border-black">
                    <input type="text" id="d-duvida" placeholder="Dúvida/Solução" class="border p-2 rounded font-bold text-black border-black">
                    <button id="btn-d-save" onclick="addDuvida()" class="bg-blue-700 text-white p-2 rounded hover:bg-blue-800 font-bold uppercase">Salvar</button>
                </div>
            </div>

            <div class="mb-4">
                <input type="text" id="f-duvidas" onkeyup="renderAll()" placeholder="🔍 Filtrar dúvidas (Suporte ou Texto)..." class="input-filtro bg-white">
            </div>

            <div class="bg-white rounded-lg shadow-md overflow-x-auto border border-gray-300">
                <table class="w-full text-left" id="tabela-duvidas">
                    <thead class="bg-gray-200 text-xs uppercase font-black text-black">
                        <tr>
                            <th class="p-3">Data</th>
                            <th class="p-3">Suporte</th>
                            <th class="p-3">Descrição</th>
                            <th class="p-3 text-right">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="lista-duvidas"></tbody>
                </table>
            </div>
        </div>

        <!-- ABA: N3 / VERSÕES -->
        <div id="ordens" class="tab-content">
            <div class="bg-white p-6 rounded-lg shadow-md mb-6 border-t-4 border-red-600">
                <h2 class="text-lg font-bold mb-4 text-red-700 underline italic">N3 / QA / Desenvolvimento</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                    <input type="hidden" id="o-id">
                    <input type="date" id="o-data" class="border p-2 rounded font-bold text-black border-black">
                    <input type="text" id="o-os" placeholder="Nº O.S" class="border p-2 rounded font-bold text-black border-black">
                    <input type="text" id="o-desk" placeholder="Nº DESK" class="border p-2 rounded bg-yellow-50 font-bold text-black border-black">
                    <select id="o-situacao" class="border p-2 rounded font-black text-black border-black">
                        <option value="ABERTA">ABERTA</option>
                        <option value="FECHADA">FECHADA</option>
                    </select>
                    <select id="o-sistema" class="border p-2 rounded font-black text-black border-black">
                        <option value="STOR">STOR</option>
                        <option value="AGRO">AGRO</option>
                    </select>
                    <input type="text" id="o-cliente" placeholder="Licença/Empresa" class="border p-2 rounded font-bold text-black border-black">
                    <input type="text" id="o-solicitante" placeholder="Solicitante (Suporte)" class="border p-2 rounded font-bold text-black border-black">
                    <input type="text" id="o-versao" placeholder="Versão Correção" class="border p-2 rounded text-red-700 font-black border-red-600">
                    <textarea id="o-log" placeholder="Change Log / Detalhes" class="border p-2 rounded col-span-full h-20 font-medium text-black border-black"></textarea>
                    <button id="btn-o-save" onclick="addOrdem()" class="bg-red-600 text-white p-2 rounded hover:bg-red-700 col-span-full font-bold uppercase">Registrar em Versão</button>
                </div>

                <div class="bg-gray-50 p-4 rounded border-2 border-red-200">
                    <input type="text" id="filtro-versao" onkeyup="renderAll()" placeholder="🔍 Filtrar N3 por O.S., Versão ou Empresa..." class="input-filtro mb-2">
                    <button onclick="exportarN3Filtrado()" class="bg-green-700 text-white px-4 py-2 rounded text-xs font-bold uppercase hover:bg-green-800">Exportar Filtro Atual (Excel)</button>
                </div>
            </div>
            <div id="lista-ordens" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <!-- ABA: OUTRAS O.S. -->
        <div id="outras" class="tab-content">
            <div class="bg-white p-6 rounded-lg shadow-md mb-6 border-t-4 border-green-600">
                <h2 class="text-lg font-bold mb-4 text-green-800 underline italic">Outras O.S.</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                    <input type="hidden" id="out-id">
                    <input type="date" id="out-data" class="border p-2 rounded font-bold text-black border-black">
                    <input type="text" id="out-os" placeholder="Nº O.S" class="border p-2 rounded font-bold text-black border-black">
                    <select id="out-situacao" class="border p-2 rounded font-black text-black border-black">
                        <option value="ABERTA">ABERTA</option>
                        <option value="FECHADA">FECHADA</option>
                    </select>
                    <select id="out-sistema" class="border p-2 rounded font-black text-black border-black">
                        <option value="STOR">STOR</option>
                        <option value="AGRO">AGRO</option>
                    </select>
                    <input type="text" id="out-cliente" placeholder="Licença" class="border p-2 rounded font-bold text-black border-black">
                    <input type="text" id="out-solicitante" placeholder="Suporte N1" class="border p-2 rounded font-bold text-black border-black">
                    <input type="text" id="out-etapa" placeholder="Etapa" class="border p-2 rounded font-bold text-black border-black">
                    <input type="text" id="out-tipo" placeholder="Tipo" class="border p-2 rounded col-span-1 md:col-span-2 font-bold text-black border-black">
                    <textarea id="out-obs" placeholder="Observação" class="border p-2 rounded col-span-full h-16 font-medium text-black border-black"></textarea>
                    <button id="btn-out-save" onclick="addOutra()" class="bg-green-700 text-white p-2 rounded hover:bg-green-800 col-span-full font-bold uppercase">Salvar</button>
                </div>
            </div>

            <div class="mb-4">
                <input type="text" id="f-outras" onkeyup="renderAll()" placeholder="🔍 Filtrar O.S. de acompanhamento..." class="input-filtro bg-white">
            </div>

            <div id="lista-outras" class="grid grid-cols-1 gap-3 text-sm"></div>
        </div>

        <!-- ABA: DASHBOARD -->
        <div id="dash" class="tab-content">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 text-center font-bold">
                <div class="bg-white p-6 rounded-lg shadow-xl border-b-8 border-blue-800">
                    <p class="text-gray-500 uppercase text-xs">Total Dúvidas</p>
                    <h3 id="stat-duvidas" class="text-4xl text-blue-800 font-black">0</h3>
                </div>
                <div class="bg-white p-6 rounded-lg shadow-xl border-b-8 border-red-600">
                    <p class="text-gray-500 uppercase text-xs text-red-600">Correções N3</p>
                    <h3 id="stat-ordens" class="text-4xl text-red-600 font-black">0</h3>
                </div>
                <div class="bg-white p-6 rounded-lg shadow-xl border-b-8 border-green-600">
                    <p class="text-gray-500 uppercase text-xs text-green-700">Outras O.S.</p>
                    <h3 id="stat-outras" class="text-4xl text-green-700 font-black">0</h3>
                </div>
            </div>
            <div class="bg-white p-6 rounded-lg shadow text-center">
                <h3 class="font-black text-gray-900 mb-4 uppercase">Opções de Exportação</h3>
                <button onclick="exportarCSVCompleto()" class="bg-black text-white px-8 py-3 rounded hover:bg-gray-800 transition font-black uppercase shadow-lg">Exportar Tudo para Excel (.CSV)</button>
            </div>
        </div>
    </div>

    <script>
        let duvidas = JSON.parse(localStorage.getItem('thomas_duvidas_v13')) || [];
        let ordens = JSON.parse(localStorage.getItem('thomas_ordens_v13')) || [];
        let outras = JSON.parse(localStorage.getItem('thomas_outras_v13')) || [];

        // --- SISTEMA DE PORTABILIDADE ---
        function exportarJSON() {
            const dataFull = { duvidas, ordens, outras, versao: "13.0", backup_data: new Date().toLocaleDateString() };
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(dataFull));
            const dlAnchor = document.createElement('a');
            dlAnchor.setAttribute("href", dataStr);
            dlAnchor.setAttribute("download", "backup_thomas_v13_" + new Date().toISOString().split('T')[0] + ".json");
            dlAnchor.click();
        }

        function importarJSON(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (confirm("Substituir dados atuais pelo backup?")) {
                        duvidas = imported.duvidas || [];
                        ordens = imported.ordens || [];
                        outras = imported.outras || [];
                        save();
                    }
                } catch (err) { alert("Erro no JSON."); }
            };
            reader.readAsText(file);
        }

        // --- AUXILIARES ---
        function formatData(dataISO) {
            if(!dataISO || dataISO.includes('/')) return dataISO;
            const p = dataISO.split('-');
            return `${p[2]}/${p[1]}/${p[0]}`;
        }

        function converterParaISO(dataBR) {
            if(!dataBR || dataBR.includes('-')) return dataBR;
            const p = dataBR.split('/');
            return `${p[2]}-${p[1]}-${p[0]}`;
        }

        // Função crucial para ordenação (Recente primeiro)
        function compararDatas(a, b) {
            const dateA = new Date(converterParaISO(a.data));
            const dateB = new Date(converterParaISO(b.data));
            return dateB - dateA; 
        }

        window.onload = () => {
            const hoje = new Date().toISOString().split('T')[0];
            document.getElementById('d-data').value = hoje;
            document.getElementById('o-data').value = hoje;
            document.getElementById('out-data').value = hoje;
            renderAll();
        };

        function showTab(event, tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
            renderAll();
        }

        function save() {
            localStorage.setItem('thomas_duvidas_v13', JSON.stringify(duvidas));
            localStorage.setItem('thomas_ordens_v13', JSON.stringify(ordens));
            localStorage.setItem('thomas_outras_v13', JSON.stringify(outras));
            renderAll();
        }

        // --- OPERAÇÕES ---
        function addDuvida() {
            const id = document.getElementById('d-id').value;
            const obj = { data: formatData(document.getElementById('d-data').value), suporte: document.getElementById('d-suporte').value, texto: document.getElementById('d-duvida').value };
            if(!obj.suporte || !obj.texto) return alert("Preencha os campos!");
            if(id !== "") { duvidas[id] = obj; document.getElementById('d-id').value = ""; }
            else { duvidas.push(obj); }
            save();
            document.getElementById('d-duvida').value = "";
            document.getElementById('btn-d-save').innerText = "Salvar";
        }

        function addOrdem() {
            const id = document.getElementById('o-id').value;
            const obj = {
                data: formatData(document.getElementById('o-data').value), os: document.getElementById('o-os').value,
                desk: document.getElementById('o-desk').value, situacao: document.getElementById('o-situacao').value,
                sistema: document.getElementById('o-sistema').value, cliente: document.getElementById('o-cliente').value,
                solicitante: document.getElementById('o-solicitante').value, versao: document.getElementById('o-versao').value,
                log: document.getElementById('o-log').value
            };
            if(!obj.os) return alert("O.S. obrigatória!");
            if(id !== "") { ordens[id] = obj; document.getElementById('o-id').value = ""; }
            else { ordens.push(obj); }
            save();
            ['o-os','o-desk','o-cliente','o-solicitante','o-versao','o-log'].forEach(i => document.getElementById(i).value = "");
        }

        function addOutra() {
            const id = document.getElementById('out-id').value;
            const obj = {
                data: formatData(document.getElementById('out-data').value), os: document.getElementById('out-os').value,
                situacao: document.getElementById('out-situacao').value, sistema: document.getElementById('out-sistema').value,
                cliente: document.getElementById('out-cliente').value, solicitante: document.getElementById('out-solicitante').value,
                etapa: document.getElementById('out-etapa').value, tipo: document.getElementById('out-tipo').value, obs: document.getElementById('out-obs').value
            };
            if(!obj.os) return alert("O.S. obrigatória!");
            if(id !== "") { outras[id] = obj; document.getElementById('out-id').value = ""; }
            else { outras.push(obj); }
            save();
            ['out-os','out-cliente','out-solicitante','out-etapa','out-tipo','out-obs'].forEach(i => document.getElementById(i).value = "");
        }

        function deleteItem(index, tipo) {
            if(!confirm("Apagar?")) return;
            if(tipo === 'd') duvidas.splice(index, 1);
            else if(tipo === 'o') ordens.splice(index, 1);
            else outras.splice(index, 1);
            save();
        }

        function editarDuvida(idx) { 
            const d = duvidas[idx]; document.getElementById('d-id').value = idx; 
            document.getElementById('d-data').value = converterParaISO(d.data);
            document.getElementById('d-suporte').value = d.suporte; document.getElementById('d-duvida').value = d.texto;
            window.scrollTo(0,0);
        }

        function editarOrdem(idx) {
            const o = ordens[idx]; document.getElementById('o-id').value = idx;
            document.getElementById('o-data').value = converterParaISO(o.data);
            ['os','desk','situacao','sistema','cliente','solicitante','versao','log'].forEach(k => document.getElementById('o-'+k).value = o[k]);
            window.scrollTo(0,0);
        }

        function editarOutra(idx) {
            const out = outras[idx]; document.getElementById('out-id').value = idx;
            document.getElementById('out-data').value = converterParaISO(out.data);
            ['os','situacao','sistema','cliente','solicitante','etapa','tipo','obs'].forEach(k => document.getElementById('out-'+k).value = out[k]);
            window.scrollTo(0,0);
        }

        // --- RENDERIZAÇÃO COM ORDENAÇÃO AUTOMÁTICA ---
        function renderAll() {
            // 1. Render Dúvidas (Ordenado por Data)
            const fDuv = document.getElementById('f-duvidas').value.toLowerCase();
            const duvidasOrdenadas = [...duvidas].sort(compararDatas);
            
            document.getElementById('lista-duvidas').innerHTML = duvidasOrdenadas
                .filter(d => d.suporte.toLowerCase().includes(fDuv) || d.texto.toLowerCase().includes(fDuv))
                .map((d) => {
                    const originalIdx = duvidas.indexOf(d);
                    return `<tr class="border-b text-sm">
                        <td class="p-3"><span class="badge-data">${d.data}</span></td>
                        <td class="p-3 font-black text-blue-900 uppercase">${d.suporte}</td>
                        <td class="p-3 text-xs font-bold text-gray-900">${d.texto}</td>
                        <td class="p-3 text-right space-x-2 font-black uppercase text-[10px]">
                            <button onclick="editarDuvida(${originalIdx})" class="text-orange-600 hover:underline">Editar</button>
                            <button onclick="deleteItem(${originalIdx},'d')" class="text-red-600">Excluir</button>
                        </td>
                    </tr>`}).join('');

            // 2. Render N3 (Ordenado por Data)
            const fN3 = document.getElementById('filtro-versao').value.toLowerCase();
            const ordensOrdenadas = [...ordens].sort(compararDatas);

            document.getElementById('lista-ordens').innerHTML = ordensOrdenadas
                .filter(o => o.versao.toLowerCase().includes(fN3) || o.os.toLowerCase().includes(fN3) || o.cliente.toLowerCase().includes(fN3))
                .map((o) => {
                    const originalIdx = ordens.indexOf(o);
                    return `<div class="bg-white p-4 rounded shadow-md border-l-8 border-red-600">
                        <div class="flex justify-between font-black text-black">
                            <span>O.S ${o.os} | <span class="text-blue-700">DESK: ${o.desk || '-'}</span></span>
                            <span class="text-[10px] px-2 py-1 rounded border border-black ${o.situacao === 'FECHADA' ? 'situacao-fechada' : 'situacao-aberta'}">${o.situacao}</span>
                        </div>
                        <p class="mt-1"><span class="badge-sistema">${o.sistema}</span> <span class="text-[10px] font-black text-black ml-2 uppercase">SUPORTE: ${o.solicitante || '?'}</span></p>
                        <p class="text-[11px] font-black text-black mt-2"><span class="badge-data">${o.data}</span> | ${o.cliente}</p>
                        <p class="mt-2 text-xs italic bg-gray-100 p-2 border border-gray-400 rounded text-black font-bold">"${o.log}"</p>
                        <div class="flex justify-between mt-3 items-center">
                            <span class="font-black text-red-700 text-sm bg-red-50 px-2 rounded border-2 border-red-200">${o.versao}</span>
                            <div class="space-x-3 text-[10px] font-black uppercase">
                                <button onclick="editarOrdem(${originalIdx})" class="text-orange-600">Editar</button>
                                <button onclick="deleteItem(${originalIdx},'o')" class="text-red-500">Excluir</button>
                            </div>
                        </div>
                    </div>`}).join('');

            // 3. Render Outras (Ordenado por Data)
            const fOut = document.getElementById('f-outras').value.toLowerCase();
            const outrasOrdenadas = [...outras].sort(compararDatas);

            document.getElementById('lista-outras').innerHTML = outrasOrdenadas
                .filter(out => out.os.toLowerCase().includes(fOut) || out.cliente.toLowerCase().includes(fOut) || out.obs.toLowerCase().includes(fOut))
                .map((out) => {
                    const originalIdx = outras.indexOf(out);
                    return `<div class="bg-white p-3 rounded shadow border-l-4 border-green-600 flex justify-between items-center border border-gray-200">
                        <div>
                            <div class="flex gap-2 items-center">
                                <span class="font-black text-black text-xs">O.S ${out.os}</span>
                                <span class="text-[9px] font-black px-1 rounded border border-black ${out.situacao === 'FECHADA' ? 'situacao-fechada' : 'situacao-aberta'}">${out.situacao}</span>
                            </div>
                            <p class="text-[10px] font-black text-black mt-1"><span class="badge-data">${out.data}</span> | <span class="badge-sistema text-[8px]">${out.sistema}</span> | ${out.cliente}</p>
                            <p class="text-[10px] font-black text-red-700 italic uppercase mt-1">ETAPA: ${out.etapa}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] text-black font-bold">${out.obs}</p>
                            <div class="space-x-2 text-[10px] font-black uppercase mt-1">
                                <button onclick="editarOutra(${originalIdx})" class="text-orange-600">Editar</button>
                                <button onclick="deleteItem(${originalIdx},'out')" class="text-red-500">Excluir</button>
                            </div>
                        </div>
                    </div>`}).join('');

            document.getElementById('stat-duvidas').innerText = duvidas.length;
            document.getElementById('stat-ordens').innerText = ordens.length;
            document.getElementById('stat-outras').innerText = outras.length;
        }

        // Exportação CSV
        function exportarCSVCompleto() {
            let csv = "Tipo;Data;OS;DESK;Situacao;Sistema;Cli_Sup;Versao_Etapa_Obs\n";
            [...duvidas].sort(compararDatas).forEach(d => csv += `DUVIDA;${d.data};-;-;-;-;${d.suporte};${d.texto.replace(/;/g, ',')}\n`);
            [...ordens].sort(compararDatas).forEach(o => csv += `N3;${o.data};${o.os};${o.desk};${o.situacao};${o.sistema};${o.cliente} | ${o.solicitante};${o.versao} - ${o.log.replace(/;/g, ',')}\n`);
            [...outras].sort(compararDatas).forEach(out => csv += `OUTRAS;${out.data};${out.os};-;${out.situacao};${out.sistema};${out.cliente} | ${out.solicitante};${out.etapa} - ${out.obs.replace(/;/g, ',')}\n`);
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement('a');
            a.href = window.URL.createObjectURL(blob);
            a.download = "gerenciador_n2_completo_v13.csv";
            a.click();
        }

        function exportarN3Filtrado() {
            const termo = document.getElementById('filtro-versao').value.toLowerCase();
            const filtradas = ordens.filter(o => o.versao.toLowerCase().includes(termo)).sort(compararDatas);
            if(filtradas.length === 0) return alert("Nada no filtro!");
            let csv = "Data;OS;DESK;Situacao;Sistema;Cliente;Solicitante;Versao;Log\n";
            filtradas.forEach(o => csv += `${o.data};${o.os};${o.desk};${o.situacao};${o.sistema};${o.cliente};${o.solicitante};${o.versao};${o.log.replace(/;/g, ',')}\n`);
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement('a');
            a.href = window.URL.createObjectURL(blob);
            a.download = `filtro_n3_v13.csv`;
            a.click();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calculadora N2 - Final 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-slate-800 rounded-3xl shadow-2xl border border-slate-700 overflow-hidden">
        <div class="bg-gradient-to-r from-blue-700 to-cyan-600 p-6">
            <h1 class="text-xl font-black uppercase italic tracking-tighter text-white">Holerite Digital N2</h1>
            <p class="text-[9px] font-bold opacity-90 uppercase tracking-widest text-blue-100">Cálculos Finais - Lei 15.270/2025</p>
        </div>

        <div class="p-6 space-y-5">
            <!-- Salário com Máscara -->
            <div>
                <label class="block text-[10px] font-black uppercase text-cyan-400 mb-1">Salário Bruto Mensal</label>
                <div class="relative">
                    <span class="absolute left-4 top-3 text-lg font-bold text-slate-500">R$</span>
                    <input type="text" id="brutoInput" oninput="mascaraMoeda(this)" placeholder="0,00" 
                        class="w-full bg-slate-900 border-2 border-slate-700 rounded-xl p-3 pl-12 text-xl font-bold focus:border-cyan-500 outline-none transition-all">
                </div>
            </div>

            <!-- Dependentes -->
            <div>
                <label class="block text-[10px] font-black uppercase text-cyan-400 mb-1">Nº de Dependentes</label>
                <input type="number" id="dependentes" value="0" min="0"
                    class="w-full bg-slate-900 border-2 border-slate-700 rounded-xl p-3 text-lg font-bold focus:border-cyan-500 outline-none">
            </div>

            <button onclick="calcularN2()" 
                class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-black py-4 rounded-xl uppercase tracking-widest shadow-lg active:scale-95 transition-all">
                Calcular Líquido
            </button>

            <!-- Resultado -->
            <div id="display" class="hidden space-y-3">
                <div class="space-y-2 border-t border-slate-700 pt-4 text-[11px] uppercase font-bold">
                    <div class="flex justify-between">
                        <span class="text-slate-400">INSS (Portaria 13/2026):</span>
                        <span id="vInss" class="text-red-400">- R$ 0,00</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-slate-400">IRRF (Tabela Bruta):</span>
                        <span id="vIrrfBruto" class="text-red-300">- R$ 0,00</span>
                    </div>
                    <div class="flex justify-between text-emerald-400 italic">
                        <span>Redução (Isenção R$ 5k):</span>
                        <span id="vReducao">+ R$ 0,00</span>
                    </div>
                    <!-- Totalizador IRRF Efetivo -->
                    <div class="flex justify-between border-t border-slate-600 pt-2 text-white bg-slate-700/30 p-2 rounded">
                        <span>IRRF Efetivo (Total):</span>
                        <span id="vIrrfEfetivo">R$ 0,00</span>
                    </div>
                </div>

                <div class="mt-4 bg-slate-900 p-5 rounded-2xl border-b-4 border-cyan-500 shadow-xl">
                    <span class="text-[9px] font-black text-cyan-400 uppercase italic">Líquido Final</span>
                    <div id="vLiquido" class="text-3xl font-black text-white">R$ 0,00</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Função para formatar o input como moeda R$
        function mascaraMoeda(i) {
            let v = i.value.replace(/\D/g,'');
            v = (v/100).toFixed(2) + '';
            v = v.replace(".", ",");
            v = v.replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,");
            v = v.replace(/(\d)(\d{3}),/g, "$1.$2,");
            i.value = v;
        }

        function converterParaFloat(valorStr) {
            if(!valorStr) return 0;
            return parseFloat(valorStr.replace(/\./g, '').replace(',', '.'));
        }

        function calcularN2() {
            const bruto = converterParaFloat(document.getElementById('brutoInput').value);
            const numDep = parseInt(document.getElementById('dependentes').value) || 0;
            
            // 1. INSS (Portaria 13 de 2026)
            let inss = 0;
            if (bruto <= 1621.00) inss = bruto * 0.075;
            else if (bruto <= 2902.84) inss = (bruto * 0.09) - 24.315;
            else if (bruto <= 4354.27) inss = (bruto * 0.12) - 111.4002;
            else if (bruto <= 8475.55) inss = (bruto * 0.14) - 198.4856;
            else inss = 988.09;

            // 2. IRRF BRUTO (Pela Tabela de Alíquotas)
            const baseIRRF = bruto - inss - (numDep * 189.59);
            let irrfBruto = 0;
            if (baseIRRF <= 2428.80) irrfBruto = 0;
            else if (baseIRRF <= 2826.65) irrfBruto = (baseIRRF * 0.075) - 182.16;
            else if (baseIRRF <= 3751.05) irrfBruto = (baseIRRF * 0.15) - 394.16;
            else if (baseIRRF <= 4664.68) irrfBruto = (baseIRRF * 0.225) - 675.49;
            else irrfBruto = (baseIRRF * 0.275) - 908.73;

            // 3. REDUÇÃO (Nova Isenção R$ 5k)
            let valorReducao = 0;
            if (bruto <= 5000.00) {
                valorReducao = 312.89; 
            } else if (bruto <= 7350.00) {
                valorReducao = 978.62 - (0.133145 * bruto);
            } else {
                valorReducao = 0;
            }

            // 4. TOTALIZADORES
            const irrfFinal = Math.max(0, irrfBruto - valorReducao);
            const liquido = bruto - inss - irrfFinal;

            // Display com 2 casas decimais
            const fmt = (v) => v.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});

            document.getElementById('display').classList.remove('hidden');
            document.getElementById('vInss').innerText = `- R$ ${fmt(inss)}`;
            document.getElementById('vIrrfBruto').innerText = `- R$ ${fmt(irrfBruto)}`;
            document.getElementById('vReducao').innerText = `+ R$ ${fmt(valorReducao)}`;
            document.getElementById('vIrrfEfetivo').innerText = `R$ ${fmt(irrfFinal)}`;
            document.getElementById('vLiquido').innerText = `R$ ${fmt(liquido)}`;
        }
    </script>
</body>
</html>

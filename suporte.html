<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Suporte STOR</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0b0f14;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    .header {
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111827;
      font-size: 18px;
      font-weight: bold;
      border-bottom: 1px solid #1f2937;
    }

    .container {
      height: calc(100vh - 50px);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <div class="header">
    Suporte STOR
  </div>

  <div class="container">
    <iframe src="https://olyrum.github.io/alltools/"></iframe>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manutenção Crítica</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #020617, #0f172a);
    font-family: Arial;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.container {
    animation: fadeIn 1s ease;
}

/* logo */
.logo {
    width: 80px;
    margin-bottom: 20px;
    animation: float 3s infinite ease-in-out;
}

/* título */
h1 {
    font-size: 50px;
    margin-bottom: 10px;
}

/* subtitulo */
p {
    color: #cbd5f5;
    font-size: 18px;
}

/* loading fake */
.bar {
    width: 250px;
    height: 8px;
    background: #1e293b;
    border-radius: 10px;
    margin: 20px auto;
    overflow: hidden;
}

.progress {
    height: 100%;
    width: 0%;
    background: #02727e;
    animation: load 6s infinite;
}

/* textos zoeira */
#msg {
    margin-top: 15px;
    font-size: 14px;
    color: #94a3b8;
}

/* contador */
#timer {
    margin-top: 10px;
    font-size: 13px;
    color: #64748b;
}

/* animações */
@keyframes fadeIn {
    from {opacity:0; transform:translateY(15px);}
    to {opacity:1; transform:translateY(0);}
}

@keyframes float {
    0%,100% {transform:translateY(0);}
    50% {transform:translateY(-8px);}
}

@keyframes load {
    0% {width:0%;}
    50% {width:80%;}
    100% {width:0%;}
}
</style>
</head>

<body>

<div class="container">

    <img src="logo.png" class="logo">

    <h1>🚧 Sistema em manutenção</h1>
    <p>Aguardando a boa vontade do Murylo 😅</p>

    <div class="bar">
        <div class="progress"></div>
    </div>

    <div id="msg">Inicializando...</div>
    <div id="timer">Tempo esperando: 0s</div>

</div>

<script>

// contador
let segundos = 0;
setInterval(() => {
    segundos++;
    document.getElementById("timer").innerText =
        "Tempo esperando: " + segundos + "s";
}, 1000);

// mensagens zoeira
const mensagens = [
    "Tentando localizar o Murylo...",
    "Chamando no WhatsApp...",
    "Visualizado às 14:32",
    "Digitando...",
    "Parou de digitar",
    "Reiniciando paciência...",
    "Carregando café ☕...",
    "Verificando se voltou do almoço...",
    "Consultando o universo...",
    "Chamando suporte do suporte...",
    "Aguardando milagre...",
    "Sistema quase pronto... confia",
    "Tentando novamente daqui a pouco..."
];

setInterval(() => {
    const random = mensagens[Math.floor(Math.random() * mensagens.length)];
    document.getElementById("msg").innerText = random;
}, 2500);

</script>

</body>
</html>
